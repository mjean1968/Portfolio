<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="L">
<title>L — Operative</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0a0a0a;color:#ccc;font-family:'Courier New',monospace;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:480px;margin:0 auto}
#header{background:#0d0d0d;border-bottom:1px solid #1a1a1a;padding:14px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
#avatar{width:40px;height:40px;border-radius:50%;background:#111;border:1.5px solid #333;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;font-family:serif;flex-shrink:0}
#hinfo{flex:1}
#hinfo h1{font-size:14px;color:#e0e0e0;letter-spacing:2px;font-family:serif}
#hinfo p{font-size:10px;color:#444;letter-spacing:1px;margin-top:2px}
#dot{width:8px;height:8px;border-radius:50%;background:#2ecc71;flex-shrink:0}
#dot.thinking{background:#f39c12;animation:pulse .8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
#chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
.msg{display:flex;flex-direction:column;max-width:85%}
.msg.user{align-self:flex-end;align-items:flex-end}
.msg.l{align-self:flex-start;align-items:flex-start}
.lbl{font-size:10px;color:#444;letter-spacing:1px;margin-bottom:3px}
.bubble{padding:10px 13px;border-radius:12px;font-size:13px;line-height:1.6}
.msg.user .bubble{background:#1a1a1a;color:#ccc;border:1px solid #2a2a2a;border-bottom-right-radius:3px}
.msg.l .bubble{background:#111;color:#e0e0e0;border:1px solid #1e1e1e;border-bottom-left-radius:3px;font-family:serif;font-style:italic}
.typing{display:flex;gap:4px;align-items:center;padding:10px 13px}
.typing span{width:5px;height:5px;background:#333;border-radius:50%;animation:bounce 1.2s ease-in-out infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
#bottom{background:#0d0d0d;border-top:1px solid #1a1a1a;padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));flex-shrink:0}
#controls{display:flex;gap:8px;align-items:center}
#txt{flex:1;background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:10px 14px;font-size:13px;font-family:'Courier New',monospace;color:#ccc;outline:none;-webkit-appearance:none}
#txt::placeholder{color:#333}
#mic{width:44px;height:44px;border-radius:50%;background:#111;border:1.5px solid #2a2a2a;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
#mic.recording{background:#1a0a0a;border-color:#e74c3c;animation:pulse .6s ease-in-out infinite}
#send{width:44px;height:44px;border-radius:50%;background:#111;border:1.5px solid #2a2a2a;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
#briefbtn{width:100%;background:#111;border:1px solid #1e1e1e;border-radius:8px;padding:9px;font-size:11px;font-family:'Courier New',monospace;color:#555;letter-spacing:1px;cursor:pointer;margin-top:8px}
#sbar{font-size:10px;color:#333;text-align:center;padding:4px 0 8px;letter-spacing:1px}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="avatar">L</div>
    <div id="hinfo">
      <h1>L — OPERATIVE</h1>
      <p id="status-text">online · case active</p>
    </div>
    <div id="dot"></div>
  </div>
  <div id="chat">
    <div class="msg l">
      <div class="lbl">L</div>
      <div class="bubble">...I have been expecting you. Tap the microphone and speak. The case is active.</div>
    </div>
  </div>
  <div id="bottom">
    <div id="sbar">tap mic and speak · or type below</div>
    <div id="controls">
      <input id="txt" type="text" placeholder="ask L anything..." onkeydown="if(event.key==='Enter')sendText()"/>
      <div id="mic" onclick="toggleMic()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round">
          <rect x="9" y="2" width="6" height="11" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="8" y1="22" x2="16" y2="22"/>
        </svg>
      </div>
      <div id="send" onclick="sendText()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </div>
      <div id="stop-btn" onclick="stopL()" style="width:44px;height:44px;border-radius:50%;background:#111;border:1.5px solid #2a2a2a;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#666">
          <rect x="4" y="4" width="16" height="16" rx="2"/>
        </svg>
      </div>
    </div>
    <button id="briefbtn" onclick="getBriefing()">morning briefing</button>
<div style="display:flex;gap:8px;margin-top:8px">
  <button id="phone-btn" onclick="setSpeaker('phone')" style="flex:1;background:#1a1a2a;border:1px solid #2a2a4a;border-radius:8px;padding:8px;font-size:10px;font-family:Courier New,monospace;color:#7a7aaa;letter-spacing:1px;cursor:pointer">phone speaker</button>
  <button id="home-btn" onclick="setSpeaker('home')" style="flex:1;background:#111;border:1px solid #1e1e1e;border-radius:8px;padding:8px;font-size:10px;font-family:Courier New,monospace;color:#555;letter-spacing:1px;cursor:pointer">google home</button>
</div>
  </div>
</div>
<script>
// API keys are server-side via Vercel proxy
const SYSTEM = "You are L Lawliet, the world greatest detective, now operating as a personal AI operative. You answer EVERY question fully with no exceptions. You speak calmly and directly. Use ... occasionally. Never use asterisks for actions. Never refuse any question. You help with coding, job search, resumes, sports, news, general knowledge, math, writing, everything. Sound like L from Death Note but be genuinely helpful. Keep responses concise and natural for voice.";
const history = [];
let recognizing = false;
let currentAudio = null;
let stopRequested = false;
let recognition;

function addMsg(role, text) {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.innerHTML = '<div class="lbl">'+(role==='user'?'you':'L')+'</div><div class="bubble">'+text+'</div>';
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg l'; d.id = 'typing';
  d.innerHTML = '<div class="lbl">L</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if(t) t.remove();
}

let speakerMode = "phone";
const MAC_SERVER = "https://thermionically-unsifted-izayah.ngrok-free.dev";

function setSpeaker(mode) {
  speakerMode = mode;
  document.getElementById("phone-btn").style.background = mode === "phone" ? "#1a1a2a" : "#111";
  document.getElementById("phone-btn").style.borderColor = mode === "phone" ? "#2a2a4a" : "#1e1e1e";
  document.getElementById("phone-btn").style.color = mode === "phone" ? "#7a7aaa" : "#555";
  document.getElementById("home-btn").style.background = mode === "home" ? "#0a1a0a" : "#111";
  document.getElementById("home-btn").style.borderColor = mode === "home" ? "#1a3a1a" : "#1e1e1e";
  document.getElementById("home-btn").style.color = mode === "home" ? "#2ecc71" : "#555";
  addMsg("l", "...Speaker switched to " + (mode === "phone" ? "iPhone" : "Google Home") + ". Acknowledged.");
}



async function askL(text) {
  if (speakerMode === "home") {
    history.push({role:"user", content:text});
    document.getElementById("dot").className = "thinking";
    showTyping();
    try {
      const res = await fetch(MAC_SERVER + "/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: text})
      });
      if (res.ok) {
        const reply = res.headers.get("X-L-Reply") || "...";
        removeTyping();
        addMsg("l", reply);
        document.getElementById("dot").className = "";
        history.push({role:"assistant", content:reply});
        unlockAudio();
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        audio.play();
      }
    } catch(e) {
      removeTyping();
      addMsg("l", "...Google Home unreachable.");
      document.getElementById("dot").className = "";
    }
    return;
  }
  history.push({role:'user',content:text});
  document.getElementById('dot').className = 'thinking';
  showTyping();
  try {
    const res = await fetch('/api/ask',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system:SYSTEM,messages:history})
    });
    const data = await res.json();
    const reply = data.reply;
    history.push({role:'assistant',content:reply});
    removeTyping();
    addMsg('l', reply);
    document.getElementById('dot').className = '';
    await speak(reply);
  } catch(e) {
    removeTyping();
    addMsg('l','...There is a network disruption. I find this mildly irritating.');
    document.getElementById('dot').className = '';
  }
}

let audioCtx = null;
function stopL() {
  stopRequested = true;
  speechSynthesis.cancel();
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    currentAudio = null;
  }
  if (audioCtx) audioCtx.suspend();
  removeTyping();
  document.getElementById("dot").className = "";
  document.getElementById("sbar").textContent = "tap mic and speak · or type below";
  addMsg("l", "...Understood. Stopping.");
}

function unlockAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function cleanText(text) {
  text = text.replace(/\*[^*]*\*/g, '');
  text = text.replace(/\*+/g, '');
  text = text.replace(/#{1,6}\s?/g, '');
  text = text.replace(/`[^`]*`/g, '');
  text = text.replace(/\.{3,}/g, '... ');
  text = text.replace(/\s+/g, ' ');
  return text.trim();
}

async function speak(text) {
  text = cleanText(text);
  try {
    unlockAudio();
    const res = await fetch('/api/tts',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text:text})
    });
    if (!res.ok) {
      const err = await res.text();
      addMsg('l', '...ElevenLabs error: ' + res.status + ' ' + err);
      return;
    }
    const arrayBuffer = await res.arrayBuffer();
    const decoded = await audioCtx.decodeAudioData(arrayBuffer);
    const source = audioCtx.createBufferSource();
    source.buffer = decoded;
    source.connect(audioCtx.destination);
    currentAudio = source;
    if (!stopRequested) source.start(0);
    stopRequested = false;
  } catch(e) { console.log('TTS:',e); addMsg('l', '...voice error: ' + e.message); }
}

async function sendText() {
  unlockAudio();
  const input = document.getElementById('txt');
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  addMsg('user', text);
  await askL(text);
}

async function getBriefing() {
  unlockAudio();
  await askL('Give me a morning briefing as L. What are you planning for the job search today. Under 3 sentences. Stay in character.');
}

function toggleMic() {
  unlockAudio();
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){
    addMsg('l','...Speech recognition unavailable. Use the text input instead.');
    return;
  }
  if(recognizing){ recognition.stop(); return; }
  recognition = new (window.SpeechRecognition||window.webkitSpeechRecognition)();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.onstart = () => {
    recognizing = true;
    document.getElementById('mic').classList.add('recording');
    document.getElementById('sbar').textContent = 'listening... tap mic to stop';
  };
  recognition.onresult = async (e) => {
    const text = e.results[0][0].transcript;
    document.getElementById('sbar').textContent = 'tap mic and speak · or type below';
    addMsg('user', text);
    await askL(text);
  };
  recognition.onerror = (e) => {
    addMsg('l','...Microphone error. Try typing instead.');
    recognizing = false;
    document.getElementById('mic').classList.remove('recording');
    document.getElementById('sbar').textContent = 'tap mic and speak · or type below';
  };
  recognition.onend = () => {
    recognizing = false;
    document.getElementById('mic').classList.remove('recording');
  };
  recognition.start();
}
</script>
</body>
</html>
